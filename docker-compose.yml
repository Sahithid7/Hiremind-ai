services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hiremind-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-hiremind}:${POSTGRES_PASSWORD:-hiremind}@db:5432/${POSTGRES_DB:-hiremind}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    container_name: hiremind-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hiremind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hiremind}
      POSTGRES_DB: ${POSTGRES_DB:-hiremind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hiremind} -d ${POSTGRES_DB:-hiremind}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
